name: Bug report
description: Report a reproducible problem in this public repository.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, exploit secrets, private customer data, wallet material, recovery data, or local absolute paths. Use private vulnerability reporting for security issues.
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include safe commands, public links, and versions needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Public-safe evidence
      description: Add logs or screenshots only after removing private information.
  - type: checkboxes
    id: safety
    attributes:
      label: Public-safety check
      options:
        - label: This report contains no secrets or private data.
          required: true
